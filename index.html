<!DOCTYPE html>
<!-- Declaração do tipo de documento HTML5 -->
<html lang="pt-BR">
<!-- Início do documento HTML com idioma português brasileiro -->
<head>
    <!-- Seção de metadados da página -->
    <meta charset="UTF-8">
    <!-- Define a codificação de caracteres como UTF-8 -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- Compatibilidade com Internet Explorer -->
    <meta name="description" content="Jogue como um patinho e evite as flores espinhosas neste divertido jogo de plataforma. Pressione Espaço para pular e tente bater o recorde!">
    <!-- Descrição da página para motores de busca -->
    <meta name="keywords" content="jogo, patinho, flores espinhosas, plataforma, diversão, recorde">
    <!-- Palavras-chave para SEO -->
    <meta name="author" content="K.P">
    <!-- Autor da página -->
    <meta name="robots" content="index, follow">
    <!-- Instruções para robôs de busca -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Configuração da viewport para dispositivos móveis -->
    <title>O Modo Jogo</title>
    <!-- Título da página -->
    <link rel="stylesheet" href="o-modo-jogo.css">
    <!-- Link para o arquivo CSS -->
</head>
<body>
    <!-- Corpo da página -->
    <div class="container">
        <!-- Container principal do conteúdo -->
        <h1>O Patinhos e os Espinhos</h1>
        <!-- Título do jogo -->
        <p class="instructions">Controle o patinho: pressione Espaço ou toque para pular. Evite as flores espinhosas e tente bater o recorde.</p>
        <!-- Instruções do jogo -->
        <div class="game-area">
            <!-- Área do jogo -->
            <canvas id="gameCanvas" width="900" height="300"></canvas>
            <!-- Canvas onde o jogo é renderizado -->
            <div class="hud">
                <!-- Interface de usuário do jogo (HUD) -->
                <span id="score">Score: 0</span>
                <!-- Exibe a pontuação -->
                <span id="status">Pressione Espaço para iniciar</span>
                <!-- Exibe o status do jogo -->
            </div>
        </div>
    </div>

    <script src="o-modo-jogo.js"></script>
    <!-- Link para o arquivo JavaScript -->
</body>
</html>
